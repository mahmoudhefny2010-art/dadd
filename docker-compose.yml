version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: dad-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_123
    volumes:
      - mongodb_data:/data/db
    networks:
      - dad-network

  backend:
    build: ./backend
    container_name: dad-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:secure_password_123@mongodb:27017/dad-medical-tracker?authSource=admin
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - dad-network

  frontend:
    image: nginx:alpine
    container_name: dad-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - dad-network

volumes:
  mongodb_data:

networks:
  dad-network:
    driver: bridge
